<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Keuangan Personal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Dompetku Dashboard</h1>
            <p>ngutang sama dengan -1 pintu surga</p>
        </header>

        <section class="summary">
            <div class="card card-total">
                <h3>Total Saldo</h3>
                <p id="total-balance">Rp 0</p>
            </div>
            <div class="card card-income">
                <h3>Pemasukan</h3>
                <p id="total-income">Rp 0</p>
            </div>
            <div class="card card-expense">
                <h3>Pengeluaran</h3>
                <p id="total-expense">Rp 0</p>
            </div>
        </section>

        <section class="input-section">
            <input type="text" id="desc" placeholder="Keterangan (misal: Beli Kopi)">
            <input type="number" id="amount" placeholder="Jumlah (Rp)">
            <select id="type">
                <option value="income">Pemasukan</option>
                <option value="expense">Pengeluaran</option>
            </select>
            <button onclick="addTransaction()">Tambah</button>
        </section>

        <section class="history">
            <h3>Riwayat Transaksi</h3>
            <ul id="transaction-list">
                </ul>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
